<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay Bilal</title>
<link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-16x16.png">
<style>
  :root {
    --background-color: #fcf5e4;
    --theme-color: rgb(140, 72, 229);
    --text-color: #000;
    --muted: #5c5748;
    --serif-font: Georgia, serif;
    --starling: #6935d3;
    --wise: #163300;
    --wise-accent: #9fe870;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100vh;
    font-family: var(--serif-font);
    color: var(--text-color);
    background-color: var(--background-color);
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 48px 20px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
    max-width: 640px;
  }

  header h1 {
    font-size: 2.6em;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  header p {
    margin-top: 12px;
    font-size: 1.1em;
    color: var(--muted);
    line-height: 1.5;
  }

  .options {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 28px;
    width: 100%;
    max-width: 760px;
  }

  .card {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    text-decoration: none;
    color: inherit;
    background: #fff;
    border: 2px solid rgba(0, 0, 0, 0.08);
    border-radius: 22px;
    padding: 44px 28px;
    min-height: 260px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
  }

  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 18px 44px rgba(0, 0, 0, 0.16);
  }

  .card.preferred {
    border-color: var(--starling);
  }

  .card.preferred:hover { border-color: var(--starling); }

  .badge {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--starling);
    color: #fff;
    font-family: var(--serif-font);
    font-size: 0.8em;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .logo {
    font-size: 2.6em;
    margin-bottom: 6px;
  }

  .card h2 {
    font-size: 1.9em;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .card .desc {
    margin-top: 10px;
    font-size: 1em;
    color: var(--muted);
    line-height: 1.45;
  }

  .cta {
    margin-top: 22px;
    display: inline-block;
    font-size: 0.95em;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 11px 26px;
    border-radius: 30px;
    color: #fff;
  }

  .starling .cta { background: var(--starling); }
  .wise .cta { background: var(--wise); color: var(--wise-accent); }

  footer {
    margin-top: 48px;
    font-size: 0.9em;
    color: var(--muted);
    text-align: center;
  }

  footer a { color: var(--theme-color); }

  @media (max-width: 620px) {
    body { padding: 40px 16px; }
    header { margin-bottom: 40px; }
    header h1 { font-size: 2em; }
    header p { font-size: 1em; }
    .options {
      grid-template-columns: 1fr;
      gap: 34px;
      max-width: 420px;
    }
    .card { min-height: 220px; padding: 40px 24px; }
  }
</style>
</head>
<body>

<header>
  <h1>Pay Bilal</h1>
  <p>Pick whichever works for you. Starling is preferred — it's instant and fee-free.</p>
</header>

<div class="options">

  <a class="card preferred starling" href="https://settleup.starlingbank.com/bilal-chughtai-10b70f">
    <span class="badge">Preferred</span>
    <div class="logo">⚡</div>
    <h2>Starling</h2>
    <div class="desc">Best for UK bank transfers.<br>Instant &amp; fee-free.</div>
    <span class="cta">Pay with Starling →</span>
  </a>

  <a class="card wise" href="https://wise.com/pay/me/bilalsohailrazac">
    <div class="logo">🌍</div>
    <h2>Wise</h2>
    <div class="desc">Best for international<br>&amp; multi-currency payments.</div>
    <span class="cta">Pay with Wise →</span>
  </a>

</div>

<footer>
  <a href="/">← bilalchughtai.co.uk</a>
</footer>

</body>
</html>
